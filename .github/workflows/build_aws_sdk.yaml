name: Build AWS SDK
run-name: Weekly Build - AWS SDK for C++

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6am UTC

permissions:
  id-token: write
  contents: read
  actions: write  # Required to delete caches

concurrency:
  group: build-aws-sdk
  cancel-in-progress: false

jobs:
  # Windows Builds
  build-win-release:
    name: Windows - Build AWS SDK (Release)
    runs-on: windows-latest
    steps:
      - name: Checkout aws-advanced-odbc-wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: build-aws-sdk-win-rel
      - name: Build AWS SDK for C++
        run: |
          ./scripts/compile_aws_sdk_win.ps1 Release
      - name: Save AWS SDK Cache
        uses: ./.github/actions/s3-cache
        with:
          action: save
          path: aws_sdk/install
          key: ${{ runner.os }}-aws-sdk-cpp-Release-shared
          bucket: ${{ secrets.S3_CACHE_BUCKET }}

  build-win-debug:
    name: Windows - Build AWS SDK (Debug)
    runs-on: windows-latest
    steps:
      - name: Checkout aws-advanced-odbc-wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: build-aws-sdk-win-dbg
      - name: Build AWS SDK for C++
        run: |
          ./scripts/compile_aws_sdk_win.ps1 Debug
      - name: Save AWS SDK Cache
        uses: ./.github/actions/s3-cache
        with:
          action: save
          path: aws_sdk/install
          key: ${{ runner.os }}-aws-sdk-cpp-Debug-shared
          bucket: ${{ secrets.S3_CACHE_BUCKET }}

  # macOS Builds
  build-macos-release:
    name: MacOS - Build AWS SDK (Release)
    runs-on: macos-15
    steps:
      - name: Checkout aws-advanced-odbc-wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install Build Dependencies
        run: |
          brew update && brew upgrade && brew cleanup
          brew install cmake unixodbc postgresql curl openssl zlib icu4c
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: build-aws-sdk-mac-rel
      - name: Build AWS SDK for C++
        run: |
          export SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          ./scripts/compile_aws_sdk_unix.sh Release
      - name: Save AWS SDK Cache
        uses: ./.github/actions/s3-cache
        with:
          action: save
          path: aws_sdk/install
          key: ${{ runner.os }}-aws-sdk-cpp-Release-shared
          bucket: ${{ secrets.S3_CACHE_BUCKET }}

  build-macos-debug:
    name: MacOS - Build AWS SDK (Debug)
    runs-on: macos-15
    steps:
      - name: Checkout aws-advanced-odbc-wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install Build Dependencies
        run: |
          brew update && brew upgrade && brew cleanup
          brew install cmake unixodbc postgresql curl openssl zlib icu4c
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: build-aws-sdk-mac-dbg
      - name: Build AWS SDK for C++
        run: |
          export SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          ./scripts/compile_aws_sdk_unix.sh Debug
      - name: Save AWS SDK Cache
        uses: ./.github/actions/s3-cache
        with:
          action: save
          path: aws_sdk/install
          key: ${{ runner.os }}-aws-sdk-cpp-Debug-shared
          bucket: ${{ secrets.S3_CACHE_BUCKET }}

  # Linux Builds
  build-linux-release:
    name: Linux Ubuntu - Build AWS SDK (Release)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aws-advanced-odbc-wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt-get install cmake libcurl4-openssl-dev libssl-dev odbcinst unixodbc-dev uuid-dev zlib1g-dev libicu-dev
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: build-aws-sdk-linux-rel
      - name: Build AWS SDK for C++
        run: |
          ./scripts/compile_aws_sdk_unix.sh Release
      - name: Save AWS SDK Cache
        uses: ./.github/actions/s3-cache
        with:
          action: save
          path: aws_sdk/install
          key: ${{ runner.os }}-aws-sdk-cpp-Release-shared
          bucket: ${{ secrets.S3_CACHE_BUCKET }}

  build-linux-debug:
    name: Linux Ubuntu - Build AWS SDK (Debug)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aws-advanced-odbc-wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt-get install cmake libcurl4-openssl-dev libssl-dev odbcinst unixodbc-dev uuid-dev zlib1g-dev libicu-dev
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: build-aws-sdk-linux-dbg
      - name: Build AWS SDK for C++
        run: |
          ./scripts/compile_aws_sdk_unix.sh Debug
      - name: Save AWS SDK Cache
        uses: ./.github/actions/s3-cache
        with:
          action: save
          path: aws_sdk/install
          key: ${{ runner.os }}-aws-sdk-cpp-Debug-shared
          bucket: ${{ secrets.S3_CACHE_BUCKET }}
