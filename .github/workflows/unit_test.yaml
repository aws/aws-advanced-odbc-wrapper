name: Unit Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '**/*.jpg'
      - '**/*.png'
      - '**/README.*'
      - '**/LICENSE.*'
      - 'docs/**'
      - 'ISSUE_TEMPLATE/**'

permissions:
  id-token: write
  contents: read
  actions: write

env:
  BUILD_CONFIG: Release

jobs:
  check-caches:
    name: Check AWS SDK Caches
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aws-advanced-odbc-wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: unit-check-caches
      - name: Check S3 caches, trigger build if needed, and fail fast
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          S3_CACHE_BUCKET: ${{ secrets.S3_CACHE_BUCKET }}
        with:
          script: |
            const { execSync } = require('child_process');
            const bucket = process.env.S3_CACHE_BUCKET;

            function s3KeyExists(key) {
              try {
                execSync(`aws s3api head-object --bucket ${bucket} --key ${key}.tar.gz`, { stdio: 'pipe' });
                return true;
              } catch {
                return false;
              }
            }

            const sdkKeys = [
              'Windows-aws-sdk-cpp-Release-shared',
              'macOS-aws-sdk-cpp-Release-shared',
              'Linux-aws-sdk-cpp-Release-shared'
            ];

            const ref = context.payload.pull_request ? context.payload.pull_request.head.ref : context.ref;
            const missingSdk = sdkKeys.filter(k => !s3KeyExists(k));
            if (missingSdk.length > 0) {
              console.log(`Missing AWS SDK caches: ${missingSdk.join(', ')}`);
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'build_aws_sdk.yaml',
                ref: ref
              });
              console.log('AWS SDK build dispatched.');
              core.setFailed('AWS SDK caches are missing. Build workflow has been dispatched. Re-run this workflow after the build completes.');
            } else {
              console.log('All AWS SDK caches present.');
            }

  test-win-unit:
    name: Windows - Unit Test
    needs: [check-caches]
    runs-on: windows-latest
    steps:
      - name: Checkout aws-advanced-odbc-wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: odbc-wrapper-win-unit
      - name: Retrieve AWS SDK for C++ Cache
        uses: ./.github/actions/s3-cache
        with:
          action: restore
          path: aws_sdk/install
          key: ${{ runner.os }}-aws-sdk-cpp-${{env.BUILD_CONFIG}}-shared
          bucket: ${{ secrets.S3_CACHE_BUCKET }}
          fail-on-cache-miss: 'true'
      - name: Build ANSI aws-advanced-odbc-wrapper
        run: |
          cmake -S . -B build -DBUILD_UNICODE=OFF -DBUILD_UNIT_TEST=ON -DCMAKE_BUILD_TYPE=${{env.BUILD_CONFIG}}
          cmake --build build --config ${{env.BUILD_CONFIG}}
          ./build/test/unit_test/${{env.BUILD_CONFIG}}/unit-test.exe
      - name: Build Unicode aws-advanced-odbc-wrapper
        run: |
          cmake -S . -B build -DBUILD_UNICODE=ON -DBUILD_UNIT_TEST=ON -DCMAKE_BUILD_TYPE=${{env.BUILD_CONFIG}}
          cmake --build build --config ${{env.BUILD_CONFIG}}
          ./build/test/unit_test/${{env.BUILD_CONFIG}}/unit-test.exe

  test-macos-unit:
    name: MacOS - Unit Test
    needs: [check-caches]
    runs-on: macos-15
    steps:
      - name: Checkout aws-advanced-odbc-wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install Build Dependencies
        run: |
          brew update && brew upgrade && brew cleanup
          brew install cmake unixodbc postgresql curl openssl zlib icu4c
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: odbc-wrapper-macos-unit
      - name: Retrieve AWS SDK for C++ Cache
        uses: ./.github/actions/s3-cache
        with:
          action: restore
          path: aws_sdk/install
          key: ${{ runner.os }}-aws-sdk-cpp-${{env.BUILD_CONFIG}}-shared
          bucket: ${{ secrets.S3_CACHE_BUCKET }}
          fail-on-cache-miss: 'true'
      - name: Build ANSI aws-advanced-odbc-wrapper
        run: |
          cmake -S . -B build -DBUILD_UNICODE=OFF -DBUILD_UNIT_TEST=ON -DCMAKE_BUILD_TYPE=${{env.BUILD_CONFIG}}
          cmake --build build
          ./build/test/unit_test/unit-test
#        env:
#          ASAN_OPTIONS: 'detect_container_overflow=0'
      - name: Build Unicode aws-advanced-odbc-wrapper
        run: |
          cmake -S . -B build -DBUILD_UNICODE=ON -DBUILD_UNIT_TEST=ON -DCMAKE_BUILD_TYPE=${{env.BUILD_CONFIG}}
          cmake --build build
          ./build/test/unit_test/unit-test
#        env:
#          ASAN_OPTIONS: 'detect_container_overflow=0'

  test-linux-unit:
    name: Linux Ubuntu - Unit Test
    needs: [check-caches]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aws-advanced-odbc-wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt-get install cmake libcurl4-openssl-dev libssl-dev odbcinst unixodbc-dev uuid-dev zlib1g-dev libicu-dev
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: odbc-wrapper-linux-unit
      - name: Retrieve AWS SDK for C++ Cache
        uses: ./.github/actions/s3-cache
        with:
          action: restore
          path: aws_sdk/install
          key: ${{ runner.os }}-aws-sdk-cpp-${{env.BUILD_CONFIG}}-shared
          bucket: ${{ secrets.S3_CACHE_BUCKET }}
          fail-on-cache-miss: 'true'
      - name: Build ANSI aws-advanced-odbc-wrapper
        run: |
          cmake -S . -B build -DBUILD_UNICODE=OFF -DBUILD_UNIT_TEST=ON -DCMAKE_BUILD_TYPE=${{env.BUILD_CONFIG}}
          cmake --build build
          ./build/test/unit_test/unit-test
      - name: Build Unicode aws-advanced-odbc-wrapper
        run: |
          cmake -S . -B build -DBUILD_UNICODE=ON -DBUILD_UNIT_TEST=ON -DCMAKE_BUILD_TYPE=${{env.BUILD_CONFIG}}
          cmake --build build
          ./build/test/unit_test/unit-test
