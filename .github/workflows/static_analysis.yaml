name: Run Static Analysis

on:
  workflow_dispatch:
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - '**/*.md'
      - '**/*.jpg'
      - '**/*.png'
      - '**/README.*'
      - '**/LICENSE.*'
      - 'docs/**'
      - 'ISSUE_TEMPLATE/**'

env:
  BUILD_CONFIG: Release

permissions:
  id-token: write
  contents: read
  actions: write

jobs:
  check-caches:
    name: Check AWS SDK Caches
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aws-advanced-odbc-wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: static-check-caches
      - name: Check S3 caches, trigger build if needed, and fail fast
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          S3_CACHE_BUCKET: ${{ secrets.S3_CACHE_BUCKET }}
        with:
          script: |
            const { execSync } = require('child_process');
            const bucket = process.env.S3_CACHE_BUCKET;

            function s3KeyExists(key) {
              try {
                execSync(`aws s3api head-object --bucket ${bucket} --key ${key}.tar.gz`, { stdio: 'pipe' });
                return true;
              } catch {
                return false;
              }
            }

            const ref = context.payload.pull_request ? context.payload.pull_request.head.ref : context.ref;
            // Static analysis only runs on macOS
            const sdkKeys = [
              'macOS-aws-sdk-cpp-Release'
            ];

            const missingSdk = sdkKeys.filter(k => !s3KeyExists(k));
            if (missingSdk.length > 0) {
              console.log(`Missing AWS SDK caches: ${missingSdk.join(', ')}`);
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'build_aws_sdk.yaml',
                ref: ref
              });
              console.log('AWS SDK build dispatched.');
              core.setFailed('AWS SDK caches are missing. Build workflow has been dispatched. Re-run this workflow after the build completes.');
            } else {
              console.log('All AWS SDK caches present.');
            }

  static-analysis:
    name: Static Analysis
    needs: [check-caches]
    runs-on: macos-latest
    steps:
      - name: Checkout aws-advanced-odbc-wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install Build Dependencies
        run: |
          brew update && brew upgrade && brew cleanup
          brew install cmake unixodbc curl openssl zlib cppcheck llvm icu4c
          python3 -m venv ./venv
          source ./venv/bin/activate
          python3 -m pip install CodeChecker==6.24.4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: static-analysis
      - name: Retrieve AWS SDK for C++ Cache
        uses: ./.github/actions/s3-cache
        with:
          action: restore
          path: aws_sdk/install
          key: ${{ runner.os }}-aws-sdk-cpp-${{env.BUILD_CONFIG}}
          bucket: ${{ secrets.S3_CACHE_BUCKET }}
          fail-on-cache-miss: 'true'
      - name: Build aws-advanced-odbc-wrapper
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_CONFIG}} \
            -DBUILD_UNICODE=OFF -DBUILD_UNIT_TEST=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=1
      - name: Run static analysis
        continue-on-error: true
        run: |
          export PATH="/opt/homebrew/opt/llvm/bin:$PATH"
          whereis clang-tidy
          source ./venv/bin/activate
          CodeChecker analyze -i ./.clang-skipfile -o ./reports --analyzer-config clang-tidy:take-config-from-directory=true -d cppcheck ./build/compile_commands.json
      - name: Print static analysis
        run: |
          source ./venv/bin/activate
          CodeChecker parse --print-steps ./reports
