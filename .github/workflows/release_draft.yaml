name: Release Draft
run-name: aws-advanced-odbc-wrapper Draft Release - ${{ github.ref_name }}

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  id-token: write
  actions: write
  contents: write
  deployments: write
  packages: write
  pull-requests: write
  repository-projects: write

env:
  WIX_VERSION: 5.0.2
  BUILD_CONFIG: Release

jobs:
  check-caches:
    name: Check AWS SDK Caches
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aws-advanced-odbc-wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: release-check-caches
      - name: Check S3 caches, trigger build if needed, and fail fast
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          S3_CACHE_BUCKET: ${{ secrets.S3_CACHE_BUCKET }}
        with:
          script: |
            const { execSync } = require('child_process');
            const bucket = process.env.S3_CACHE_BUCKET;

            function s3KeyExists(key) {
              try {
                execSync(`aws s3api head-object --bucket ${bucket} --key ${key}.tar.gz`, { stdio: 'pipe' });
                return true;
              } catch {
                return false;
              }
            }

            const sdkKeys = [
              'Windows-aws-sdk-cpp-Release-shared',
              'macOS-aws-sdk-cpp-Release-shared',
              'Linux-aws-sdk-cpp-Release-shared'
            ];

            const ref = context.payload.pull_request ? context.payload.pull_request.head.ref : context.ref;
            const missingSdk = sdkKeys.filter(k => !s3KeyExists(k));
            if (missingSdk.length > 0) {
              console.log(`Missing AWS SDK caches: ${missingSdk.join(', ')}`);
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'build_aws_sdk.yaml',
                ref: ref
              });
              console.log('AWS SDK build dispatched.');
              core.setFailed('AWS SDK caches are missing. Build workflow has been dispatched. Re-run this workflow after the build completes.');
            } else {
              console.log('All AWS SDK caches present.');
            }

  build-windows:
    needs: [check-caches]
    runs-on: windows-latest
    steps:
      - name: Checkout aws-advanced-odbc-wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: release-win
      - name: Retrieve AWS SDK for C++ Cache
        uses: ./.github/actions/s3-cache
        with:
          action: restore
          path: aws_sdk/install
          key: ${{ runner.os }}-aws-sdk-cpp-${{env.BUILD_CONFIG}}-shared
          bucket: ${{ secrets.S3_CACHE_BUCKET }}
          fail-on-cache-miss: 'true'
      - name: Setup Dotnet for WiX
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5
      - name: Install WiX
        shell: cmd
        run: |
          dotnet tool install --global wix --version ${{env.WIX_VERSION}}
          wix extension add --global WixToolset.UI.wixext/${{env.WIX_VERSION}}
      - name: Run build installer script
        shell: pwsh
        run: |
          ./installer/build_installer.ps1 ${{env.BUILD_CONFIG}}
      - name: Configure AWS credentials OIDC
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          role-skip-session-tagging: true
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: aws-odbc-win-signer
      - name: Configure AWS credentials Signer
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          role-skip-session-tagging: true
          role-chaining: true
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-to-assume: ${{ secrets.AWS_SIGNER_ROLE }}
          role-external-id: ${{ secrets.AWS_SIGNER_ROLE_ID }}
      - name: Run signer script
        shell: pwsh
        working-directory: ./scripts
        run: |
          choco upgrade jq -y
          . ".\sign_artifacts_win.ps1"
          Invoke-SignInstaller ../installer winx64a ${{ github.ref_name }} ${{ secrets.AWS_UNSIGNED_BUCKET }} ${{ secrets.AWS_SIGNED_BUCKET }} ${{ secrets.AWS_S3_KEY }}aws-advanced-odbc-wrapper-${{ github.ref_name }}-winx64a.msi
      - name: Upload installer
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: installers-windows
          path: ./installer/*winx64a.msi
          retention-days: 5
          if-no-files-found: error

  build-macos:
    needs: [check-caches]
    runs-on: macos-15
    outputs:
      macos_arm64_ansi: ${{ steps.macos-arm64-ansi.outputs.hash }}
      macos_arm64_unicode: ${{ steps.macos-arm64-unicode.outputs.hash }}
    steps:
      - name: Checkout aws-advanced-odbc-wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install Build Dependencies
        run: |
          brew update && brew upgrade && brew cleanup
          brew install cmake unixodbc curl openssl zlib icu4c
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: release-macos
      - name: Retrieve AWS SDK for C++ Cache
        uses: ./.github/actions/s3-cache
        with:
          action: restore
          path: aws_sdk/install
          key: ${{ runner.os }}-aws-sdk-cpp-${{env.BUILD_CONFIG}}-shared
          bucket: ${{ secrets.S3_CACHE_BUCKET }}
          fail-on-cache-miss: 'true'
      - name: Build aws-advanced-odbc-wrapper
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_CONFIG}} -DUNIT_TEST=OFF
          cmake --build build
          ls ./build/driver/
      - name: Check Artifacts
        shell: bash
        run:
          ls -l ${{ github.workspace }}/build/driver/
      - name: Install gnu-tar
        run: brew install gnu-tar
      - name: Configure AWS credentials OIDC
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          role-skip-session-tagging: true
          aws-region: us-west-1
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: aws-odbc-mac-signer
      - name: Configure AWS credentials Signer
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          role-skip-session-tagging: true
          role-chaining: true
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-to-assume: ${{ secrets.AWS_SIGNER_ROLE }}
          role-external-id: ${{ secrets.AWS_SIGNER_ROLE_ID }}
      - name: Sign macOS artifacts
        env:
          MAC_SIGNER_S3_BUCKET: ${{ secrets.AWS_MAC_SIGNER_S3_BUCKET }}
          MAC_SIGNER_PRESIGNED_PREFIX: ${{ secrets.AWS_MAC_SIGNER_PRESIGNED_PREFIX }}
          MAC_SIGNER_SIGNED_PREFIX: ${{ secrets.AWS_MAC_SIGNER_SIGNED_PREFIX }}
          MAC_SIGNER_DYLIBS_DIR: ${{ secrets.AWS_MAC_SIGNER_DYLIBS_DIR }}
          MAC_SIGNER_PKG_DIR: ${{ secrets.AWS_MAC_SIGNER_PKG_DIR }}
        run: |
          ./scripts/macOS/sign_artifacts_mac.sh ${{ github.ref_name }}
      - name: Upload the ANSI & Unicode driver
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: installers-macos
          path: |
            ${{ github.workspace }}/build/aws-advanced-odbc-wrapper-${{ github.ref_name }}-macos-arm64.pkg
          retention-days: 5
          if-no-files-found: error

  build-linux:
    needs: [check-caches]
    runs-on: ubuntu-latest
    outputs:
      linux_x64_ansi: ${{ steps.linux-x64-ansi.outputs.hash }}
      linux_x64_unicode: ${{ steps.linux-x64-unicode.outputs.hash }}
    steps:
      - name: Checkout aws-advanced-odbc-wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install cmake libcurl4-openssl-dev libssl-dev odbcinst unixodbc-dev uuid-dev zlib1g-dev
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6
        with:
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: release-linux
      - name: Retrieve AWS SDK for C++ Cache
        uses: ./.github/actions/s3-cache
        with:
          action: restore
          path: aws_sdk/install
          key: ${{ runner.os }}-aws-sdk-cpp-${{env.BUILD_CONFIG}}-shared
          bucket: ${{ secrets.S3_CACHE_BUCKET }}
          fail-on-cache-miss: 'true'
      - name: Build aws-advanced-odbc-wrapper
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_CONFIG}} -DUNIT_TEST=OFF
          cmake --build build
          ls ./build/driver/
      - name: Get Ansi Driver Hash
        id: linux-x64-ansi
        run: |
          hash=$(sha256sum ${{ github.workspace }}/build/driver/aws-advanced-odbc-wrapper-a.so | cut -d' ' -f1)
          echo "hash=${hash}" >> "$GITHUB_OUTPUT"
          echo ${HASH}
      - name: Get Unicode Driver Hash
        id: linux-x64-unicode
        run: |
          hash=$(sha256sum ${{ github.workspace }}/build/driver/aws-advanced-odbc-wrapper-w.so | cut -d' ' -f1)
          echo "hash=${hash}" >> "$GITHUB_OUTPUT"
          echo ${HASH}
      - name: Move Artifacts
        shell: bash
        run: |
          mkdir stage
          find ${{ github.workspace }}/build/driver/ -name "*.so*" -exec cp {} ${{ github.workspace }}/stage \;
      - name: Package Drivers as Tar
        shell: bash
        run: |
          ls stage
          cd stage
          tar -chf "aws-advanced-odbc-wrapper-${{ github.ref_name }}-linux-x64.tar.gz" --gzip *
      - name: Upload the ANSI & Unicode driver
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: installers-linux
          path: |
            ./stage/aws-advanced-odbc-wrapper-${{ github.ref_name }}-linux-x64.tar.gz
          retention-days: 5
          if-no-files-found: error

  draft-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    needs: [
      build-linux,
      build-macos,
      build-windows
    ]
    env:
      linux_x64_ansi_hash: ${{needs.build-linux.outputs.linux_x64_ansi}}
      linux_x64_unicode_hash: ${{needs.build-linux.outputs.linux_x64_unicode}}
    steps:
      - name: Checkout aws-advanced-odbc-wrapper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 1
      - name: Download all installers
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          path: installers
          pattern: installers-*
          merge-multiple: true
      - name: Extract release notes
        uses: ffurrer2/extract-release-notes@273da39a24fb7db106a35526c8162815faffd31d  # v3
        with:
          release_notes_file: RELEASE_DETAILS.md
      - name: Append Checksums
        run: |
          cat << EOF >> RELEASE_DETAILS.md

          ### SHA256 Checksums

          - linux_x64_ansi: \`$linux_x64_ansi_hash\`
          - linux_x64_unicode: \`$linux_x64_unicode_hash\`

          EOF
      - name: Upload to Draft Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd  # v1
        with:
          draft: true
          name: "AWS Advanced ODBC Wrapper - v${{ github.ref_name }}"
          bodyFile: RELEASE_DETAILS.md
          artifacts: "*/*.msi, */*.tar.gz, */*.pkg"
